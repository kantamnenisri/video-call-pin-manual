<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1:1 Video Call PIN</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #join-container { background: #333; padding: 2rem; border-radius: 8px; text-align: center; }
        input { padding: 10px; font-size: 16px; margin-bottom: 10px; width: 200px; text-align: center; letter-spacing: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #video-container { display: none; width: 100%; position: relative; height: 100vh; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 120px; height: 160px; border: 2px solid white; border-radius: 8px; z-index: 10; object-fit: cover;}
        #remote-video { width: 100%; height: 100vh; }
        #controls { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 10; padding: 10px; }
        .control-btn { background: rgba(0,0,0,0.6); padding: 18px; border-radius: 50%; border: 2px solid white; font-size: 28px; cursor: pointer; color: white; transition: all 0.2s; display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; }
        .control-btn.muted { background: #dc3545; border-color: #dc3545; }
        #end-call-btn { background: #dc3545; border-color: #dc3545; }
        #error-msg { color: #ff4444; margin-top: 10px; }
        @media (max-width: 768px) {
            #local-video { width: 100px; height: 140px; top: 15px; right: 15px; }
            #controls { bottom: 100px; gap: 15px; }
            .control-btn { padding: 12px; font-size: 24px; width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div id="join-container">
        <h2>Enter 6-Digit PIN</h2>
        <input type="text" id="pin-input" maxlength="6" pattern="\d{6}" placeholder="123456" autocomplete="off">
        <br>
        <button id="join-btn">Join Call</button>
        <div id="error-msg"></div>
    </div>

    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div id="controls">
            <button id="mute-btn" class="control-btn" title="Mute/Unmute">🎤</button>
            <button id="camera-toggle" class="control-btn" title="Toggle Camera">🔄</button>
            <button id="end-call-btn" class="control-btn" title="End Call">📞</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="/webrtc.js"></script>
</body>
</html>
